name: Keepalive

# Prevents GitHub from auto-disabling the scheduled notifier after 60 days of
# repository inactivity. Runs weekly and makes a tiny heartbeat commit ONLY if the
# repo hasn't had a commit in 45+ days — so it does nothing while CS2 keeps shipping
# updates (which commit state.json), and only kicks in during a long content drought.

on:
  schedule:
    - cron: "0 7 * * 1"   # every Monday 07:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: cs2-keepalive
  cancel-in-progress: false

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history to read the last commit date

      - name: Heartbeat if repo has been quiet 45+ days
        run: |
          last=$(git log -1 --format=%ct)
          now=$(date -u +%s)
          age_days=$(( (now - last) / 86400 ))
          echo "Days since last commit: $age_days"
          if [ "$age_days" -ge 45 ]; then
            echo "Quiet for ${age_days} days — committing heartbeat to keep schedules alive."
            date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/heartbeat.txt
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .github/heartbeat.txt
            git commit -m "chore: keepalive heartbeat [skip ci]"
            git push
          else
            echo "Repo active within 45 days — no heartbeat needed."
          fi
